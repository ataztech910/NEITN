id: dataforseo_serp_analysis
name: DataForSEO SERP Analysis
type: n8n-nodes-base.httpRequest
params:
  method: POST
  url: https://api.dataforseo.com/v3/serp/google/organic/live/advanced
  authentication: genericCredentialType
  genericAuthType: httpBasicAuth
  sendHeaders: true
  headerParameters:
    parameters:
      - name: content-type
        value: application/json
  sendBody: true
  specifyBody: json
  jsonBody: '={{ [{ keyword: $json.seo_context.top_keywords?.[0]?.keyword || $json.seo_context.keywords?.[0] || $json.seo_keywords?.keywords?.[0], location_name: $json.input.region, language_code: $json.input.seo_language, depth: 10 }] }}'
  options:
    timeout: 90000
ui:
  x: 400
  'y': -260
typeVersion: 4.2
